patch:
  switches:
    # reset: 0  → 默认取 states 第 0 项（"中文"）
    # reset: 1  → 默认取 states 第 1 项（"西文"）
    # 不写 reset → 记住上次设置的状态，不会自动重置
    # 中/英输入模式（在 Rime 内部切换到英文输出）
    - name: ascii_mode
      states: ["中文", "西文"]
      reset: 1
    # 半角/全角
    - name: full_shape
      states: ["半角", "全角"]
      reset: 0
    # 简体/繁体转换
    - name: simplification
      states: ["漢字", "汉字"]
      reset: 1
    # 中文标点/英文标点
    - name: ascii_punct
      states: ["。，", "．，"]
      reset: 0
