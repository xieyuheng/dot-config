patch:
  menu/page_size: 10
  schema_list:
    - schema: luna_pinyin
    - schema: terra_pinyin
  switcher:
    caption: "〔方案選單〕"            # 选单标题
    hotkeys:                           # 触发快捷键
      - Control+grave                  # Ctrl+`
      - F4
    save_options:
      - simplification

  # 切换到英文输入模式（即 Rime 内部直接输出英文字母）
  #   只保留 Rime 时，英文只能靠此机制输入
  #   Shift_L 使用 commit_text：先提交当前输入内容，再切换为英文模式
  ascii_composer:
    switch_key:
      Shift_L: commit_text     # 左 Shift：提交 + 切英文
      Shift_R: noop            # 右 Shift：禁用
      Caps_Lock: noop          # Caps Lock：禁用
      Control_L: noop          # 左 Ctrl：禁用
      Control_R: noop          # 右 Ctrl：禁用

  # 按键选项菜单（按需修改，列表 → { commit: "字符" } 即为直接输入 ASCII）
  punctuator/half_shape:
    "$": ["￥", "$", "€", "£", "¥", "¢", "¤"]
    "%": ["%", "％", "°", "℃"]
    "*": ["*", "＊", "·", "・", "×", "※", "❂"]
    "/": ["、", "/", "／", "÷"]
    "<": ["《", "〈", "«", "‹"]
    ">": ["》", "〉", "»", "›"]
    "[": ["「", "【", "〔", "［"]
    "\\": ["、", "\\", "＼"]
    "]": ["」", "】", "〕", "］"]
    "{": ["『", "〖", "｛"]
    "|": ["·", "|", "｜", "§", "¦"]
    "}": ["』", "〗", "｝"]
    "~": ["~", "～"]

