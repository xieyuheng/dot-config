patch:
  menu/page_size: 5
  schema_list:
    - schema: terra_pinyin
  switcher:
    caption: "〔方案選單〕"            # 选单标题
    hotkeys:                           # 触发快捷键
      - Control+grave                  # Ctrl+`
    save_options:
      - simplification

  # 切换到英文输入模式（Rime 内部直接输出英文字母，不依赖系统键盘）
  # 我们禁用这个模式
  ascii_composer:
    switch_key:
      # 每个按键可选的值：
      #   noop          禁用该键，不产生任何操作
      #   inline_ascii  直接切到英文模式，已输入的拼音原地转为英文字母
      #   commit_text   先提交已输入的拼音/候选，再切到英文模式
      #   clear         清空已输入的拼音/候选，再切到英文模式
      Shift_L: noop
      Shift_R: noop
      Caps_Lock: noop
      Control_L: noop
      Control_R: noop

  # 按键选项菜单（按需修改，列表 → { commit: "字符" } 即为直接输入 ASCII）
  punctuator/half_shape:
    "$": { commit: "$" }
    "%": { commit: "%" }
    "*": { commit: "*" }
    "\\": { commit: "、" }
    "/": { commit: "/" }
    "<": { commit: "《" }
    ">": { commit: "》" }
    "(": { commit: "（" }
    ")": { commit: "）" }
    "[": { commit: "「" }
    "]": { commit: "」" }
    "{": { commit: "【" }
    "|": { commit: "·" }
    "}": { commit: "】" }
    "~": { commit: "~" }
    ",": { commit: "，" }
    ".": { commit: "。" }
    "?": { commit: "？" }
    ":": { commit: "：" }
    ";": { commit: "；" }
    "'": ["‘", "’"]
    '"': ["“", "”"]
